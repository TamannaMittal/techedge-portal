<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel | TechEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
(function(){
  emailjs.init("jACWU8xqWmYKLKkvi");
})();
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
min-height:100vh;
color:white;
padding:20px;
background:linear-gradient(rgba(0,0,0,0.72),rgba(0,0,0,0.72)),
url('https://images.unsplash.com/photo-1555066931-4365d14bab8c') no-repeat center center fixed;
background-size:cover;
}

.notification{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#00ffae;
color:black;
padding:14px 25px;
border-radius:30px;
font-weight:bold;
display:none;
z-index:9999;
box-shadow:0 0 20px rgba(0,255,174,0.4);
}

.logout{position:absolute;top:20px;right:20px;padding:9px 22px;background:#ff4d4d;color:white;border:none;border-radius:20px;cursor:pointer;font-weight:bold;}
h1{text-align:center;margin:25px 0;}

.stats{display:flex;gap:20px;margin-bottom:25px;justify-content:center;flex-wrap:wrap;}
.card{background:rgba(255,255,255,0.12);padding:22px;border-radius:18px;text-align:center;width:210px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.18);}
.card h2{color:#00ffae;margin-top:8px;}

.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin:25px 0;}
.chart-box{background:rgba(255,255,255,0.12);padding:20px;border-radius:22px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.18);height:360px;}
.chart-box h3{text-align:center;margin-bottom:15px;color:#00ffae;}

.controls{display:flex;justify-content:space-between;align-items:center;gap:15px;margin-bottom:20px;flex-wrap:wrap;}
input{padding:12px 15px;border-radius:25px;border:none;outline:none;width:280px;}
.download{padding:12px 22px;background:#00ffae;border:none;border-radius:25px;cursor:pointer;font-weight:bold;}

.table-box{background:rgba(255,255,255,0.12);padding:20px;border-radius:22px;backdrop-filter:blur(12px);overflow-x:auto;border:1px solid rgba(255,255,255,0.18);}
table{width:100%;border-collapse:collapse;min-width:1050px;}
th,td{padding:13px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.2);}
th{color:#00ffae;}

.resume-link{color:#00ffae;text-decoration:none;font-weight:bold;}
.resume-link:hover{text-decoration:underline;}

button{padding:7px 14px;border:none;border-radius:20px;cursor:pointer;margin:3px;font-weight:600;}
.shortlist{background:#ffd43b;color:black;}
.accept{background:#00ffae;color:black;}
.reject{background:#ff4d4d;color:white;}
.delete{background:#555;color:white;}
.certificate{background:#4dabff;color:white;}

.loader{text-align:center;display:none;margin-top:20px;font-weight:bold;}
.empty{text-align:center;padding:25px;color:#ddd;}

@media(max-width:700px){
.logout{position:static;display:block;margin-left:auto;}
h1{font-size:26px;}
input{width:100%;}
.download{width:100%;}
}
</style>
</head>

<body>

<div id="notification" class="notification">New Internship Application Received 🎉</div>

<button class="logout" onclick="logout()">Logout</button>

<h1>Admin Dashboard</h1>

<div class="stats">
<div class="card"><h3>Total Applications</h3><h2 id="total">0</h2></div>
<div class="card"><h3>Accepted</h3><h2 id="accepted">0</h2></div>
<div class="card"><h3>Rejected</h3><h2 id="rejected">0</h2></div>
<div class="card"><h3>Pending</h3><h2 id="pending">0</h2></div>
<div class="card"><h3>Shortlisted</h3><h2 id="shortlisted">0</h2></div>
</div>

<div class="charts">
<div class="chart-box">
<h3>Application Status</h3>
<canvas id="statusChart"></canvas>
</div>

<div class="chart-box">
<h3>Track-wise Applications</h3>
<canvas id="trackChart"></canvas>
</div>
</div>

<div class="controls">
<input type="text" id="search" placeholder="Search by name, email or track..." onkeyup="search()">
<button class="download" onclick="download()">Download CSV</button>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Track</th>
<th>Message</th>
<th>Resume</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

<div class="loader" id="loader">Loading applications...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC4ljjtXHs_GNtK_uJi9fke0dgbWNw76qk",
authDomain: "internship-portal-pro-7cbb1.firebaseapp.com",
projectId: "internship-portal-pro-7cbb1",
storageBucket: "internship-portal-pro-7cbb1.appspot.com",
messagingSenderId: "149057403895",
appId: "1:149057403895:web:8b9bdd770e7475c2a38cf2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allData = [];
let previousCount = 0;
let statusChart;
let trackChart;

async function loadData(){
const loader = document.getElementById("loader");
loader.style.display = "block";

try{
const querySnapshot = await getDocs(collection(db, "applications"));
allData = [];

querySnapshot.forEach((docData)=>{
allData.push({
id: docData.id,
...docData.data()
});
});

if(previousCount !== 0 && allData.length > previousCount){
const notify = document.getElementById("notification");
notify.style.display = "block";

setTimeout(()=>{
notify.style.display = "none";
},3000);
}

previousCount = allData.length;

render(allData);
updateStats();
updateCharts();
}
catch(error){
alert("Error loading applications: " + error.message);
console.log(error);
}

loader.style.display = "none";
}

function updateStats(){
document.getElementById("total").innerText = allData.length;
document.getElementById("accepted").innerText = allData.filter(d => (d.status || "Pending") === "Accepted").length;
document.getElementById("rejected").innerText = allData.filter(d => (d.status || "Pending") === "Rejected").length;
document.getElementById("pending").innerText = allData.filter(d => (d.status || "Pending") === "Pending").length;
document.getElementById("shortlisted").innerText = allData.filter(d => (d.status || "Pending") === "Shortlisted").length;
}

function updateCharts(){
const accepted = allData.filter(d => (d.status || "Pending") === "Accepted").length;
const rejected = allData.filter(d => (d.status || "Pending") === "Rejected").length;
const pending = allData.filter(d => (d.status || "Pending") === "Pending").length;
const shortlisted = allData.filter(d => (d.status || "Pending") === "Shortlisted").length;

const trackCounts = {};
allData.forEach(d => {
const track = d.track || "N/A";
trackCounts[track] = (trackCounts[track] || 0) + 1;
});

if(statusChart) statusChart.destroy();
if(trackChart) trackChart.destroy();

const statusCtx = document.getElementById("statusChart").getContext("2d");
statusChart = new Chart(statusCtx, {
type: "doughnut",
data: {
labels: ["Accepted", "Rejected", "Pending", "Shortlisted"],
datasets: [{
data: [accepted, rejected, pending, shortlisted],
backgroundColor: ["#00ffae", "#ff4d4d", "#ffaa00", "#ffd43b"],
borderColor: "#ffffff",
borderWidth: 2
}]
},
options: {
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{labels:{color:"white"}}}
}
});

const trackCtx = document.getElementById("trackChart").getContext("2d");
trackChart = new Chart(trackCtx, {
type: "bar",
data: {
labels: Object.keys(trackCounts),
datasets: [{
label: "Applications",
data: Object.values(trackCounts),
backgroundColor: "#00ffae",
borderRadius: 8
}]
},
options: {
responsive:true,
maintainAspectRatio:false,
scales:{
x:{
ticks:{
color:"white",
maxRotation:0,
minRotation:0,
autoSkip:false,
font:{size:11}
},
grid:{color:"rgba(255,255,255,0.1)"}
},
y:{
beginAtZero:true,
ticks:{color:"white", precision:0},
grid:{color:"rgba(255,255,255,0.1)"}
}
},
plugins:{legend:{labels:{color:"white"}}}
}
});
}

function render(data){
let html = "";

if(data.length === 0){
html = `<tr><td colspan="7" class="empty">No applications found</td></tr>`;
}

data.forEach((d)=>{
const name = d.name || "N/A";
const email = d.email || "N/A";
const track = d.track || "N/A";
const message = d.message || "N/A";
const resume = d.resume || "";
const status = d.status || "Pending";

const resumeButton = resume
? `<a class="resume-link" href="${resume}" target="_blank">View Resume</a>`
: "N/A";

html += `
<tr>
<td>${name}</td>
<td>${email}</td>
<td>${track}</td>
<td>${message}</td>
<td>${resumeButton}</td>
<td>${status}</td>
<td>
<button class="shortlist" onclick="shortlist('${d.id}')">Shortlist</button>
<button class="accept" onclick="accept('${d.id}')">Accept</button>
<button class="reject" onclick="reject('${d.id}')">Reject</button>
<button class="delete" onclick="deleteApp('${d.id}')">Delete</button>
<button class="certificate" onclick="generateCertificate('${d.id}')">Certificate</button>
</td>
</tr>
`;
});

document.getElementById("data").innerHTML = html;
}

window.search = function(){
const val = document.getElementById("search").value.toLowerCase();

const filtered = allData.filter(d =>
(d.name || "").toLowerCase().includes(val) ||
(d.email || "").toLowerCase().includes(val) ||
(d.track || "").toLowerCase().includes(val)
);

render(filtered);
};

window.shortlist = async function(id){
await updateDoc(doc(db, "applications", id), {
status: "Shortlisted"
});

alert("Student Shortlisted ⭐");
loadData();
};

window.accept = async function(id){
const student = allData.find(s => s.id === id);

await updateDoc(doc(db, "applications", id), {
status: "Accepted"
});

try{
emailjs.send("service_h6t02iu", "template_g5ncz5e", {
name: student?.name || "",
email: student?.email || "",
track: student?.track || "",
message: student?.message || "",
resume: student?.resume || ""
});
}catch(e){
console.log("EmailJS error:", e);
}

alert("Student Accepted ✅");
loadData();
};

window.reject = async function(id){
const student = allData.find(s => s.id === id);

await updateDoc(doc(db, "applications", id), {
status: "Rejected"
});

try{
emailjs.send("service_h6t02iu", "template_vu82xuo", {
name: student?.name || "",
email: student?.email || "",
track: student?.track || "",
message: student?.message || "",
resume: student?.resume || ""
});
}catch(e){
console.log("EmailJS error:", e);
}

alert("Student Rejected ❌");
loadData();
};

window.deleteApp = async function(id){
if(confirm("Are you sure you want to delete this application?")){
await deleteDoc(doc(db, "applications", id));
alert("Application Deleted");
loadData();
}
};

window.download = function(){
let csv = "Name,Email,Track,Message,Resume,Status\n";

allData.forEach(d=>{
csv += `"${d.name || "N/A"}","${d.email || "N/A"}","${d.track || "N/A"}","${d.message || "N/A"}","${d.resume || "N/A"}","${d.status || "Pending"}"\n`;
});

const blob = new Blob([csv], {type:"text/csv"});
const url = window.URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "applications.csv";
a.click();
};

window.generateCertificate = function(id){
const student = allData.find(s => s.id === id);

if(!student){
alert("Student data not found");
return;
}

const name = student.name || "Student";
const track = student.track || "Internship";

const { jsPDF } = window.jspdf;
const pdf = new jsPDF("landscape", "mm", "a4");

const pageWidth = 297;
const pageHeight = 210;

const issueDate = new Date().toLocaleDateString("en-IN");
const certId = "TE-" + new Date().getFullYear() + "-" + Math.floor(100000 + Math.random() * 900000);
const verifyLink = `https://tamannamittal.github.io/techedge-portal/?certificate=${certId}&student=${encodeURIComponent(name)}`;

pdf.setFillColor(8, 18, 38);
pdf.rect(0, 0, pageWidth, pageHeight, "F");

pdf.setFillColor(10, 40, 75);
pdf.roundedRect(12, 12, pageWidth - 24, pageHeight - 24, 8, 8, "F");

pdf.setDrawColor(212, 175, 55);
pdf.setLineWidth(1.5);
pdf.roundedRect(18, 18, pageWidth - 36, pageHeight - 36, 6, 6, "S");

pdf.setDrawColor(0, 255, 174);
pdf.setLineWidth(0.6);
pdf.roundedRect(23, 23, pageWidth - 46, pageHeight - 46, 5, 5, "S");

pdf.setTextColor(255, 255, 255);
pdf.setFont("helvetica", "bold");
pdf.setFontSize(58);
pdf.setGState(new pdf.GState({ opacity: 0.08 }));
pdf.text("TechEdge", pageWidth / 2, 112, { align: "center" });
pdf.setGState(new pdf.GState({ opacity: 1 }));

pdf.setFillColor(0, 255, 174);
pdf.circle(pageWidth / 2, 34, 13, "F");
pdf.setTextColor(8, 18, 38);
pdf.setFontSize(15);
pdf.setFont("helvetica", "bold");
pdf.text("TE", pageWidth / 2, 39, { align: "center" });

pdf.setTextColor(0, 255, 174);
pdf.setFontSize(18);
pdf.setFont("helvetica", "bold");
pdf.text("TechEdge Internship Portal", pageWidth / 2, 55, { align: "center" });

pdf.setTextColor(212, 175, 55);
pdf.setFontSize(34);
pdf.setFont("times", "bold");
pdf.text("Certificate of Completion", pageWidth / 2, 78, { align: "center" });

pdf.setTextColor(235, 240, 255);
pdf.setFontSize(15);
pdf.setFont("helvetica", "normal");
pdf.text("This certificate is proudly presented to", pageWidth / 2, 96, { align: "center" });

pdf.setTextColor(255, 255, 255);
pdf.setFontSize(30);
pdf.setFont("times", "bold");
pdf.text(name.toUpperCase(), pageWidth / 2, 116, { align: "center" });

pdf.setDrawColor(0, 255, 174);
pdf.setLineWidth(0.8);
pdf.line(92, 122, 205, 122);

pdf.setTextColor(235, 240, 255);
pdf.setFontSize(15);
pdf.setFont("helvetica", "normal");
pdf.text("for successfully completing the", pageWidth / 2, 138, { align: "center" });

pdf.setTextColor(0, 255, 174);
pdf.setFontSize(21);
pdf.setFont("helvetica", "bold");
pdf.text(`${track} Internship`, pageWidth / 2, 151, { align: "center" });

pdf.setTextColor(235, 240, 255);
pdf.setFontSize(13);
pdf.setFont("helvetica", "normal");
pdf.text("with dedication, active participation, and successful completion of assigned learning tasks.", pageWidth / 2, 163, { align: "center" });

pdf.setTextColor(255, 255, 255);
pdf.setFontSize(11);
pdf.text(`Certificate ID: ${certId}`, 32, 181);
pdf.text(`Issue Date: ${issueDate}`, 32, 189);

pdf.setFillColor(212, 175, 55);
pdf.circle(52, 52, 16, "F");
pdf.setTextColor(8, 18, 38);
pdf.setFont("helvetica", "bold");
pdf.setFontSize(8);
pdf.text("OFFICIAL", 52, 50, { align: "center" });
pdf.text("SEAL", 52, 57, { align: "center" });

pdf.setDrawColor(212, 175, 55);
pdf.line(205, 181, 263, 181);

pdf.setTextColor(255, 255, 255);
pdf.setFont("times", "italic");
pdf.setFontSize(16);
pdf.text("Tamanna Mittal", 234, 176, { align: "center" });

pdf.setFont("helvetica", "normal");
pdf.setFontSize(11);
pdf.text("Authorized Signature", 234, 188, { align: "center" });
pdf.text("TechEdge Internship Portal", 234, 195, { align: "center" });

const qrDiv = document.createElement("div");
qrDiv.style.display = "none";
document.body.appendChild(qrDiv);

new QRCode(qrDiv, {
text: verifyLink,
width: 120,
height: 120,
correctLevel: QRCode.CorrectLevel.H
});

setTimeout(()=>{
const qrCanvas = qrDiv.querySelector("canvas");
const qrImage = qrCanvas.toDataURL("image/png");

pdf.addImage(qrImage, "PNG", 137, 173, 24, 24);

pdf.setTextColor(255, 255, 255);
pdf.setFontSize(7);
pdf.text("Scan to Verify", pageWidth / 2, 201, { align: "center" });

pdf.setFontSize(8);
pdf.text("Verified Digital Certificate", pageWidth / 2, 205, { align: "center" });

document.body.removeChild(qrDiv);

pdf.save(name + "_Professional_Certificate.pdf");
},300);
};

window.logout = function(){
window.location.href = "admin-login.html";
};

loadData();

setInterval(()=>{
loadData();
},5000);
</script>

</body>
</html>
