<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login | TechEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#0f2027;
  color:white;
  font-family:Arial;
}
.login-box{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:10px;
  width:300px;
  text-align:center;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
}
button{
  padding:10px;
  width:100%;
  border:none;
  border-radius:5px;
  background:#00ffae;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="login-box">
<h2>Student Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4ljjtXHs_GNtK_uJi9fke0dgbWNw76qk",
  authDomain: "internship-portal-pro-7cbb1.firebaseapp.com",
  projectId: "internship-portal-pro-7cbb1",
  storageBucket: "internship-portal-pro-7cbb1.appspot.com",
  messagingSenderId: "149057403895",
  appId: "1:149057403895:web:8b9bdd770e7475c2a38cf2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "student-dashboard.html";
    })
    .catch(err => {
      alert("Login Failed: " + err.message);
    });
}
</script>

</body>
</html>
